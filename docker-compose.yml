services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - flask_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
  web:
    build: .
    container_name: flaskapp
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL
      - SECRET_KEY
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
volumes:
  flask_data: