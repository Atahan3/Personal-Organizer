
{% extends "layout.html" %}

{% block content %}
{% if error %}<p>{{ error }}</p>{% endif %}

<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h3>Login</h3>
    <form action="/login"
          method="post">
        <input type="text"
               placeholder="username"
               name="username"
                required>
        <input type="password"
               placeholder="password"
               name="password"
               required>
        <input type="submit"
               value="Submit">
        <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
    </form>

    <p>Don't have an account? <a href="/register">Register</a></p>

{% endblock %}
</body>
